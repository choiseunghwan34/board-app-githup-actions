name: Deploy to EC2 k3s

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 & ECR push
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ECR_BACKEND=$ECR_REGISTRY/board-app-github-actions-backend
          ECR_FRONTEND=$ECR_REGISTRY/board-app-github-actions-frontend

          docker build -t $ECR_BACKEND:${{ github.sha }} ./backend
          docker tag $ECR_BACKEND:${{ github.sha }} $ECR_BACKEND:latest
          docker push $ECR_BACKEND:${{ github.sha }}
          docker push $ECR_BACKEND:latest

          docker build -t $ECR_FRONTEND:${{ github.sha }} ./frontend
          docker tag $ECR_FRONTEND:${{ github.sha }} $ECR_FRONTEND:latest
          docker push $ECR_FRONTEND:${{ github.sha }}
          docker push $ECR_FRONTEND:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: k8s yml 파일을 EC2에 복사
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/backend-configmap.yaml,k8s/backend-deployment.yaml,k8s/backend-service.yaml,k8s/frontend-deployment.yaml,k8s/frontend-service.yaml"
          target: "/home/ubuntu/board-app-github-actions"

      - name: EC2에 SSH 접속하여 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=/home/ubuntu/.kube/config

            ls -al /home/ubuntu/board-app-github-actions/k8s

            kubectl apply -f /home/ubuntu/board-app-github-actions/k8s/backend-configmap.yaml
            kubectl apply -f /home/ubuntu/board-app-github-actions/k8s/backend-deployment.yaml
            kubectl apply -f /home/ubuntu/board-app-github-actions/k8s/backend-service.yaml
            kubectl apply -f /home/ubuntu/board-app-github-actions/k8s/frontend-deployment.yaml
            kubectl apply -f /home/ubuntu/board-app-github-actions/k8s/frontend-service.yaml

            kubectl rollout restart deployment/backend-deployment
            kubectl rollout restart deployment/frontend-deployment

            kubectl get pods
            kubectl get svc

      - name: 배포 성공 알림
        if: success()
        run: echo "배포 성공! 커밋: ${{ github.sha }}"

      - name: 배포 실패 알림
        if: failure()
        run: echo "배포 실패! GitHub Actions 로그를 확인하세요."
