name: Deploy to EC2 # GitHub Actions 탭에서 표시되는 workflow 이름

on:
  push:
    branches:
      - main # main 브랜치에 push될 때마다 자동 실행

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub가 제공하는 Ubuntu 가상머신에서 실행

    steps:
      - name: SSH로 EC2에 접속하여 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/board-app-githup-actions
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker image prune -f

      - name: 배포 성공
        if: success()
        run: echo "배포 완료!"

      - name: 배포 실패
        if: failure()
        run: echo "배포 실패! 로그를 확인하세요."
