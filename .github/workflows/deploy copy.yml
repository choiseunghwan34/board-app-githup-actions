name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 EC2에 접속하여 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd ~/board-app-githup-actions

            git fetch origin
            git reset --hard origin/main

            docker compose down
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f

      - name: 배포 성공
        if: success()
        run: echo "배포 완료!"

      - name: 배포 실패
        if: failure()
        run: echo "배포 실패! 로그를 확인하세요."
